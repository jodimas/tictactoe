<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TicTacToe</title>
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
  <div class="container">
    <h1>TicTacToe</h1>
    
    <div id="team-selection" class="team-selection">
      <div id="selection-x" class="selection-step">
        <h2>Spieler X: Wähle deinen Verein</h2>
        <select id="player-x-team" class="team-select">
          <option value="">-- Team wählen --</option>
        </select>
        <button id="confirm-x" class="confirm-btn">Bestätigen</button>
      </div>
      
      <div id="selection-o" class="selection-step" style="display: none;">
        <h2>Spieler O: Wähle deinen Verein</h2>
        <select id="player-o-team" class="team-select">
          <option value="">-- Team wählen --</option>
        </select>
        <button id="confirm-o" class="confirm-btn">Bestätigen</button>
      </div>
    </div>
    
    <div id="status" class="status"></div>
    
    <div id="board" class="board" style="display: none;">
      <button class="cell" data-index="0"></button>
      <button class="cell" data-index="1"></button>
      <button class="cell" data-index="2"></button>
      <button class="cell" data-index="3"></button>
      <button class="cell" data-index="4"></button>
      <button class="cell" data-index="5"></button>
      <button class="cell" data-index="6"></button>
      <button class="cell" data-index="7"></button>
      <button class="cell" data-index="8"></button>
    </div>
    
    <button id="restart" class="restart">Neues Spiel</button>
  </div>

  <script type="module" src="dist/app.js"></script>
</body>
</html>
